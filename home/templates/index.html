<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Products</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.8.1/nouislider.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Search Products</h1>
        <form method="get">
            
            <div class="row">
                <div class="col-4">
                    <div class="form-group">
                        <input type="text" name="search" value="{% if search %} {{search}} {% endif %}" class="form-control" placeholder="Enter product name or description">
                    </div>
                </div>
                <div class="col-4">
                    <div class="form-group">
                        <select name="category" class="form-control">
                            <option value="">All Categories</option>
                            {% for category in categories %}
                                <option value="{{ category }}" {% if category == request.GET.category %}selected{% endif %}>{{ category }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="col-4">
                    <label for="price-slider">Price Range:</label>
                    <div id="price-slider"></div>
                    <input type="hidden" name="min_price" id="min-price">
                    <input type="hidden" name="max_price" id="max-price">
                </div>

            </div>
            <button type="submit" class="btn btn-primary">Search</button>
        </form>
        <br>
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>SKU</th>
                    <th>Thumbnail</th>
                </tr>
            </thead>
            <tbody>
                {% for product in products %}
                <tr>
                    <td>{{ product.title }}</td>
                    <td>{{ product.description }}</td>
                    <td>{{ product.category }}</td>
                    <td>${{ product.price }}</td>
                    <td>{{ product.sku }}</td>
                    <td><img src="{{ product.thumbnail }}" alt="{{ product.title }}" width="100"></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.8.1/nouislider.min.js" integrity="sha512-g/feAizmeiVKSwvfW0Xk3ZHZqv5Zs8PEXEBKzL15pM0SevEvoX8eJ4yFWbqakvRj7vtw1Q97bLzEpG2IVWX0Mg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        var priceSlider = document.getElementById('price-slider');
        noUiSlider.create(priceSlider, {
            start: [0, 1000],
            connect: true,
            range: {
                'min': 0,
                'max': 1000
            },
            tooltips: [true, true],
            format: {
                to: function (value) {
                    return '$' + value.toFixed(2);
                },
                from: function (value) {
                    return Number(value.replace('$', ''));
                }
            }
        });

        priceSlider.noUiSlider.on('update', function (values, handle) {
            document.getElementById('min-price').value = values[0];
            document.getElementById('max-price').value = values[1];
        });

        // set initial values for the price range inputs
        var minPrice = "{{ request.GET.min_price|default:0 }}";
        var maxPrice = "{{ request.GET.max_price|default:1000 }}";
        priceSlider.noUiSlider.set([minPrice, maxPrice]);

    </script>
</body>
</html>
